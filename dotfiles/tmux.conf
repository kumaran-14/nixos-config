################# tmux configuration ##################

##### Prefix ######
#unbind default prefix and set it to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# tmux display things in 256 colors
#set -g default-terminal "xterm-256color"
# for fixing tmux-fingers colors
set -g default-terminal "tmux-256color"

set -g history-limit 50000

# automatically renumber tmux windows
set -g renumber-windows on

# enable mouse support for switching panes/windows
setw -g mouse on

# Activity Monitoring
setw -g monitor-activity off
set -g visual-activity off

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize off

# make delay shorter
set -sg escape-time 0

# set default shell
set-option -g default-shell /bin/zsh

# tile all windows
#unbind =
#bind = select-layout tiled


# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1

set-option -g set-titles on
#set-option -g set-titles-string "#T - #W"
set -g set-titles-string "[#{host_short}]#{window_index}|#{?#{m:*#{pane_current_command}*,#{pane_title}},#{pane_title},#{pane_current_command} #{pane_title}}"
set-window-option -g automatic-rename on


### from pw-nix-dendritic
set -s set-clipboard on
set -g status-keys vi


#### Key Bindings ####

# reload config file
#bind r source-file ~/.tmux.conf \; display "TMUX Config Reloaded!"

#search in tmux
bind-key / copy-mode \; send-key ?

#pane navigation using h, j , k, l keys
#bind-key -n C-h select-pane -L 
# because it conflicts with ctrl-h which is delete one character, often used more frequently
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# split window and fix path for tmux 1.9
bind-key h split-window -v  -c '#{pane_current_path}'
bind-key v split-window -h  -c '#{pane_current_path}'
 
# resizing panes using shift + arrow and ctrl + arrow
# Fine adjustment (1 or 2 cursor cells per bump)
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1

# Coarse adjustment (5 or 10 cursor cells per bump)
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

# <prefix>b will break pane.
bind-key b break-pane -d

#Restoring Clear Screen (C-l) => <prefix> + C-l, because C-l is mappped to select-pane -L
bind C-l send-keys 'C-l'

# Note:<prefix>z will zoom pane by default


##############################
### Mouse scroll in PAGER ###
##############################

tmux_commands_with_legacy_scroll="nano less more man git"

bind-key -T root WheelUpPane \
	if-shell -Ft= '#{?mouse_any_flag,1,#{pane_in_mode}}' \
		'send -Mt=' \
		'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
			"send -t= Up" "copy-mode -et="'

bind-key -T root WheelDownPane \
	if-shell -Ft = '#{?pane_in_mode,1,#{mouse_any_flag}}' \
		'send -Mt=' \
		'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
			"send -t= Down" "send -Mt="'



