unbind C-h
unbind-key -T root C-h 


################ List of plugins ####################
set -g @plugin 'tmux-plugins/tpm'

#### NOTE THIS 
# tmux sensible disabled because kumaran-14 has his own tmux.conf at $DOTDIR/tmux/tmux.conf
# set -g @plugin 'tmux-plugins/tmux-sensible'

# themes
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "starlight_dark"  # Optional: defaults to lagoon_dark

#### tmux-sidebar plugin and config
set -g @plugin 'tmux-plugins/tmux-sidebar'
# open sidebas tree with 'e' and close with 'e'
set -g @sidebar-tree 'e'
set -g @sidebar-tree-command 'tree -C'

set -g @plugin 'Morantron/tmux-fingers'
# Enter Fingers mode by pressing <prefix> + 'j' . NOTE: pressing '?' will show help, which shows many useful tips
# paste automatically by pressing shift when pressing the highlighted option
set -g @fingers-key 'y' #y for yank, because it copies and pastes
set -g @fingers-hint-style 'fg=white,bold,bright,bg=colour27'
set -g @fingers-highlight-style 'fg=yellow,bold,bright,underscore,italics'

######## tmux-super-fingers: open file in vim, link in browser etc
set -g @plugin 'artemave/tmux_super_fingers'
set -g @super-fingers-key 'J'

#set -g @plugin 'tmux-plugins/tmux-yank'
# NOTE : ABOVE PLUGIN THIS DOESNT EXIT for multiple line copy. Custom tmux copy config in .tmux.conf also doesnt work

set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind 'f'
set -g @fuzzback-popup 1
set -g @fuzzback-hide-preview 1


set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-custom-paths '/Users/kumsgs/gdev'
set -g @sessionx-fzf-builtin-tmux 'on'

set -g @plugin 'tmux-plugins/tmux-resurrect'
# resurrect files are stored in ~/.local/share/tmux/resurrect/

# requires tmux-resurrct, ressurect saves sessions and restores manually. tmux-continuum continuously uses it to save and auto restore on computer restart.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on' 

# if "test ! -d ~/.tmux/plugins/tpm" \
#    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Auto-install TPM if it's missing
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run-shell 'mkdir -p ~/.tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
